name: Automation Test

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. permission gradlew
      - name: Grant execute permission
        run: chmod +x gradlew

      # 4A. Run API Test
      - name: Run API Tests
        run: ./gradlew clean apiTest

      # 4B. Run WEB / E2E Test
      - name: Run Web Tests
        run: ./gradlew webTest

      # 5. DEBUG
      - name: Debug build folder
        if: always()
        run: |
          echo "=== CHECK BUILD FOLDER ==="
          ls -R build || echo "BUILD FOLDER NOT FOUND"

      # 6. Upload All Report
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/**/*.html
            target/**/*.html