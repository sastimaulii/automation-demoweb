name: Automation Test (API + WEB + Cucumber)

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (STABLE VERSION - no v4 issue)
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Chrome (untuk web test)
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # 4. Permission gradlew
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. Run all tests (API + WEB + Cucumber)
      - name: Run Tests
        run: ./gradlew clean test

      # 6. Debug test result (optional tapi helpful)
      - name: Show Test Results
        if: always()
        run: cat build/test-results/test/*.xml || true

      # 7. Upload Cucumber + JUnit Report
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-report
          path: |
            build/reports/
            build/test-results/
            build/cucumber.json