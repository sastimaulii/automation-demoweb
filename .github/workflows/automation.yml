name: Automation Test

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: FORCE CHECK FILE
      - if: always()
      - run: |
      - echo "===== ROOT ====="
      - pwd
      - ls -la

      - echo "===== FIND BUILD ====="
      - find . -type d -name build || echo "NO BUILD DIR"

      - echo "===== FIND HTML ====="
      - find . -name "*.html" || echo "NO HTML FILE"
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run API Test
        run: ./gradlew apiTest --info

      - name: Run Web Test
        run: ./gradlew webTest --info

      - name: Debug - check files
        if: always()
        run: ls -R

      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: build/